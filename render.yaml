# Render Blueprint — SyllaNote
# Документация: https://render.com/docs/blueprint-spec
# Инструкция по развёртыванию: docs/deploy-render.md

# На аккаунте Render — только ОДНА активная free PostgreSQL.
# Если Blueprint падает с "cannot have more than one active free tier database",
# удалите старую БД в Dashboard или см. docs/deploy-render.md → «Одна free БД».
databases:
  - name: syllanote-db
    databaseName: syllanote
    user: syllanote
    plan: free

services:
  # REST API (Prisma migrate при старте)
  - type: web
    name: syllanote-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVICE_MODE
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: syllanote-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: NODE_ENV
        value: production

  # WebSocket (Hocuspocus + Yjs), отдельный инстанс — на Render один порт на сервис
  - type: web
    name: syllanote-ws
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVICE_MODE
        value: ws
      - key: DATABASE_URL
        fromDatabase:
          name: syllanote-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: syllanote-api
          envVarKey: JWT_SECRET
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production

  # Статический фронтенд (Vite). publish — каталог production-сборки (index.html + /assets/*).
  - type: web
    name: syllanote-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: syllanote-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_WS_URL
        fromService:
          type: web
          name: syllanote-ws
          envVarKey: RENDER_EXTERNAL_URL
