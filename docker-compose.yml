services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sylla
      POSTGRES_PASSWORD: sylla
      POSTGRES_DB: syllanote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sylla -d syllanote"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://sylla:sylla@postgres:5432/syllanote
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      WS_PORT: 8080
      BCRYPT_ROUNDS: 10
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
